# Cloud Build: build image → push to Artifact Registry → deploy to Cloud Run.
#
# Default substitutions (override in trigger or CLI):
#   PROJECT_ID   — GCP project (built-in; set automatically)
#   _REGION      — Artifact Registry + Cloud Run region
#   _SERVICE_NAME — Cloud Run service name
#   _REPOSITORY  — Artifact Registry repository id
#   _GITHUB_REPO — GitHub owner/repo for bookmark storage

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: competitor-intel
  _REPOSITORY: competitor-intel
  _GITHUB_REPO: owner/repo

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - "8080"
      - --min-instances
      - "0"
      - --max-instances
      - "1"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --set-secrets
      - ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GITHUB_TOKEN=GITHUB_TOKEN:latest
      - --set-env-vars
      - GITHUB_REPO=${_GITHUB_REPO},GITHUB_DATA_PATH=data/projects,NODE_ENV=production
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest
