<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competitor Intelligence Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page: #0E1116;
    --bg-card: #161A22;
    --bg-card-hover: #1B202A;
    --bg-raised: #1F2530;
    --bg-input: #1A1F29;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --text-1: #ECEEF2;
    --text-2: #9BA3B0;
    --text-3: #5C6573;
    --accent: #4FD1B3;
    --accent-dim: rgba(79,209,179,0.12);
    --accent-strong: #2FB89A;
    --gold: #E8B05C;
    --coral: #E07856;
    --violet: #9D8DF1;
    --red: #E2675F;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-serif: 'Source Serif 4', Georgia, serif;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
  }

  html, body { background: var(--bg-page); }

  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-1);
    min-height: 100vh;
    line-height: 1.5;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

  a { color: var(--accent); text-decoration: none; }

  button {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: var(--bg-raised); color: var(--text-2);
    font-size: 13px; cursor: pointer; font-family: inherit;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover:not(:disabled) { background: #262C38; color: var(--text-1); border-color: rgba(255,255,255,0.22); }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #06231C; font-weight: 600; }
  button.primary:hover:not(:disabled) { background: var(--accent-strong); border-color: var(--accent-strong); color: #06231C; }
  button.ghost { background: transparent; border-color: transparent; }
  button.ghost:hover:not(:disabled) { background: var(--bg-raised); }
  button.small { padding: 5px 10px; font-size: 12px; }
  button.big { padding: 12px 22px; font-size: 14px; }

  input, select, textarea {
    padding: 9px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: var(--bg-input);
    color: var(--text-1); font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--text-3); }
  select option { background: var(--bg-input); }
  textarea { resize: vertical; line-height: 1.6; }

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  .app-shell { max-width: 1240px; margin: 0 auto; padding: 28px 32px 64px; }

  /* ===== Setup screen ===== */
  .setup-wrap { max-width: 640px; margin: 0 auto; padding: 64px 24px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .setup-eyebrow { font-family: var(--font-serif); font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .setup-title { font-family: var(--font-serif); font-size: 34px; font-weight: 600; line-height: 1.2; margin-bottom: 12px; }
  .setup-sub { font-size: 14.5px; color: var(--text-2); line-height: 1.6; margin-bottom: 36px; max-width: 520px; }
  .setup-field { margin-bottom: 22px; }
  .setup-label { font-size: 12.5px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; display: block; }
  .setup-hint { font-size: 12px; color: var(--text-3); margin-top: 6px; line-height: 1.5; }
  .setup-field input, .setup-field textarea { width: 100%; }
  .setup-actions { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
  .setup-count { font-size: 12px; color: var(--text-3); }
  .setup-error { font-size: 12.5px; color: var(--red); margin-top: 8px; }

  .build-progress { margin-top: 28px; }
  .build-log { margin-top: 14px; max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); padding: 10px 14px; }
  .build-log-row { font-size: 12px; color: var(--text-2); padding: 3px 0; font-family: 'SF Mono', 'Consolas', monospace; }
  .build-log-row.ok { color: var(--accent); }
  .build-log-row.err { color: var(--red); }

  .progress-track { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 14px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }
  .progress-label { font-size: 11px; color: var(--text-3); margin-top: 6px; }

  /* ===== Dashboard ===== */
  .topbar {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 20px; flex-wrap: wrap;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .brand-mark { font-family: var(--font-serif); font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
  .page-title { font-family: var(--font-serif); font-size: 26px; font-weight: 600; color: var(--text-1); line-height: 1.15; }
  .page-sub { font-size: 13px; color: var(--text-2); margin-top: 5px; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1 1 220px; min-width: 160px; }
  .search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-3); pointer-events: none; }
  .search-wrap input { padding-left: 32px; width: 100%; }
  .toolbar select { flex: 0 0 auto; }
  .result-count { font-size: 12px; color: var(--text-3); margin-left: auto; white-space: nowrap; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-val { font-family: var(--font-serif); font-size: 26px; font-weight: 600; color: var(--text-1); }
  .stat-label { font-size: 11px; color: var(--text-3); margin-top: 4px; letter-spacing: 0.02em; }

  .anchor-banner { display: flex; align-items: center; gap: 10px; background: var(--accent-dim); border: 1px solid rgba(79,209,179,0.25); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 20px; font-size: 12.5px; color: var(--accent); }

  .brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }

  .brand-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 16px 18px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .brand-card:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }
  .brand-card.selected { border-color: var(--accent); background: var(--bg-card-hover); }
  .brand-card.is-anchor { border-color: rgba(79,209,179,0.4); }
  .brand-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
  .brand-name { font-weight: 600; font-size: 15px; color: var(--text-1); }
  .anchor-pip { font-size: 9.5px; padding: 2px 6px; border-radius: 8px; background: var(--accent); color: #06231C; font-weight: 700; letter-spacing: 0.04em; margin-left: 6px; vertical-align: 1px; }
  .brand-tagline { font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--text-2); margin-top: 2px; }

  .activity-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

  .tier-badge { display: inline-block; font-size: 10.5px; padding: 3px 9px; border-radius: 20px; font-weight: 600; letter-spacing: 0.01em; white-space: nowrap; }

  .key-message { font-size: 12.5px; color: var(--text-2); line-height: 1.55; margin: 10px 0; }
  .theme-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .theme-pill { font-size: 11px; padding: 3px 8px; background: var(--bg-raised); border-radius: 10px; color: var(--text-2); }

  .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
  .channel-stat { font-size: 11px; color: var(--text-3); display: inline-flex; align-items: center; gap: 4px; margin-right: 12px; }
  .tone-tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: var(--bg-raised); font-weight: 600; }

  .list-table { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .list-row { display: grid; grid-template-columns: 180px 1fr auto; gap: 16px; align-items: center; padding: 13px 18px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: var(--bg-card-hover); }
  .list-row.selected { background: var(--accent-dim); }

  .detail-panel { margin-top: 24px; background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); overflow: hidden; }
  .detail-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .detail-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .detail-name { font-family: var(--font-serif); font-weight: 600; font-size: 20px; }
  .detail-tagline { font-style: italic; font-family: var(--font-serif); font-size: 13.5px; color: var(--text-2); }

  .tab-row { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 22px; }
  .tab-btn { font-size: 13px; padding: 11px 16px; border-radius: 0; border: none; background: none; border-bottom: 2px solid transparent; color: var(--text-3); }
  .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); font-weight: 600; }
  .tab-btn:hover:not(.active) { color: var(--text-2); background: none; border-color: transparent; }

  .tab-body { padding: 22px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  @media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } .list-row { grid-template-columns: 1fr; } }

  .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 9px; }
  .body-text { font-size: 13.5px; line-height: 1.7; color: var(--text-2); }

  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
  .metric-box { background: var(--bg-raised); border-radius: var(--radius-sm); padding: 11px 13px; }
  .metric-box-label { font-size: 10.5px; color: var(--text-3); display: flex; align-items: center; gap: 4px; margin-bottom: 5px; }
  .metric-box-val { font-size: 17px; font-weight: 600; font-family: var(--font-serif); }

  .format-row { display: flex; align-items: flex-start; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .format-row:last-child { border-bottom: none; }

  .tone-chip { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border: 1px solid var(--border-strong); border-radius: 24px; margin-bottom: 18px; }

  .channel-bar-row { margin-bottom: 12px; }
  .channel-bar-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-2); margin-bottom: 5px; }
  .channel-bar-track { height: 5px; background: var(--bg-raised); border-radius: 4px; overflow: hidden; }
  .channel-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.5s ease; }

  .diff-block { background: var(--bg-raised); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); padding: 16px 20px; margin-bottom: 18px; font-size: 14px; line-height: 1.7; }
  .diff-block.empty { color: var(--text-3); font-style: italic; }

  .opp-section { margin-top: 36px; border-top: 1px solid var(--border); padding-top: 26px; }
  .opp-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .opp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
  .opp-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 17px; }
  .opp-num { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 5px; font-family: var(--font-serif); }
  .opp-title { font-size: 13.5px; font-weight: 600; margin-bottom: 6px; }
  .opp-body { font-size: 12px; color: var(--text-2); line-height: 1.55; }
  .opp-empty { font-size: 13px; color: var(--text-3); border: 1px dashed var(--border-strong); border-radius: var(--radius); padding: 24px; text-align: center; }

  .footer-note { margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-3); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  .settings-panel { background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); padding: 20px 22px; margin-bottom: 22px; }
  .settings-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .settings-row input[type="password"], .settings-row input[type="text"] { flex: 1 1 280px; min-width: 200px; }
  .key-status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .key-status.ok { color: var(--accent); }
  .key-status.missing { color: var(--text-3); }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }

  .toast { position: fixed; bottom: 22px; right: 22px; background: var(--bg-raised); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 12px 18px; font-size: 13px; max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 50; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

const PROJECT_STORAGE = "competitor_intel_project_v1";
const PROXY_URL = "https://script.google.com/a/macros/theframeworks.com/s/AKfycbzKih2ABSm4EBWtNG3bR5fu071seY6JMgCeUXb-tyj1qGH6qxSIRYIT-Oblsq9Lpy__GA/exec";

const TIERS_DEFAULT = ["All"];
const TONE_COLORS = {
  human: "#3ddc97", expert: "#5b9dff", confident: "#f0a640", intelligent: "#a78bfa",
  corporate: "#9aa3b8", analytical: "#5b9dff", purposeful: "#3ddc97", "execution-focused": "#ff8a5b",
  visionary: "#a78bfa", "research-credible": "#a78bfa", aspirational: "#f0a640", warm: "#3ddc97",
  energetic: "#ff8a5b", precise: "#5b9dff", operational: "#9aa3b8", measured: "#9aa3b8",
  "design-forward": "#f472b6", "engineering-proud": "#ff8a5b", "freshly-bold": "#a78bfa",
  ideological: "#ff5f5f", bold: "#ff8a5b", playful: "#f472b6", minimalist: "#9aa3b8",
  technical: "#5b9dff", premium: "#f0a640", disruptive: "#ff5f5f"
};
const TONE_LIST = Object.keys(TONE_COLORS);
const ACTIVITY_ORDER = { "very-high": 4, high: 3, medium: 2, low: 1 };

function loadProject() {
  try {
    const raw = localStorage.getItem(PROJECT_STORAGE);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveProject(project) {
  try { localStorage.setItem(PROJECT_STORAGE, JSON.stringify(project)); } catch (e) {}
}

function clearProject() {
  try { localStorage.removeItem(PROJECT_STORAGE); } catch (e) {}
}

function parseCompetitorList(raw) {
  return raw
    .split(/[\n,]/)
    .map(s => s.trim())
    .filter(Boolean)
    .filter((v, i, arr) => arr.findIndex(x => x.toLowerCase() === v.toLowerCase()) === i);
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || "brand";
}

/* ============================== ROOT ============================== */
function Root() {
  const [project, setProject] = useState(loadProject);

  function startProject(p) {
    setProject(p);
    saveProject(p);
  }

  function updateProject(updater) {
    setProject(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      saveProject(next);
      return next;
    });
  }

  function endProject() {
    setProject(null);
    clearProject();
  }

  if (!project) {
    return React.createElement(SetupScreen, { onStart: startProject });
  }

  return React.createElement(Dashboard, { project, updateProject, onNewProject: endProject });
}

/* ============================== SETUP SCREEN ============================== */
function SetupScreen({ onStart }) {
  const [anchor, setAnchor] = useState("");
  const [competitorsRaw, setCompetitorsRaw] = useState("");
  const [error, setError] = useState(null);
  const [building, setBuilding] = useState(false);
  const [buildProgress, setBuildProgress] = useState({ current: 0, total: 0 });
  const [buildLog, setBuildLog] = useState([]);
  const cancelRef = useRef(false);

  const competitors = parseCompetitorList(competitorsRaw);

  async function researchBrand(name, anchorName, isAnchor) {
    const prompt = `You are a competitive brand intelligence analyst. Research the current social media presence, brand positioning, and public activity for "${name}", a company being analyzed ${isAnchor ? "as the anchor brand" : `as a competitor to "${anchorName}"`}.

Return ONLY a valid JSON object, no markdown, no explanation, no code fences:
{
  "tagline": "their brand tagline or positioning phrase, max 60 chars",
  "tier": "a short category label for what kind of company this is, e.g. 'Large IT Services', 'AI Pure-Play', 'Boutique Agency', max 28 chars",
  "keyMessage": "single sentence core brand message, max 150 chars",
  "themes": ["theme1", "theme2", "theme3", "theme4"],
  "formats": ["content format 1", "content format 2", "content format 3", "content format 4"],
  "notable": "2-3 sentences on notable recent campaigns, brand moves, or news, max 300 chars",
  "tone": "one word from: ${TONE_LIST.join(", ")}",
  "activity": "one of: very-high, high, medium, low",
  "linkedin": <approximate LinkedIn followers in thousands, integer>,
  "instagram": <approximate Instagram followers in thousands, integer>,
  "youtube": <approximate YouTube subscribers in thousands, integer>,
  "differentiator": "1-2 sentences on what makes this brand distinct${isAnchor ? "" : ` versus ${anchorName}`}, max 220 chars"
}`;

    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5-20250929",
        max_tokens: 1200,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => "");
      throw new Error(`API error ${res.status}: ${errText.slice(0, 200)}`);
    }
    const data = await res.json();
    const text = (data.content && data.content[0] && data.content[0].text) || "";
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("No JSON found in response");
    return JSON.parse(jsonMatch[0]);
  }

  async function researchOpportunities(anchorName, allBrandSummaries) {
    const prompt = `You are a brand strategy consultant. The anchor brand is "${anchorName}". Here is a summary of it and its competitors:

${allBrandSummaries}

Identify exactly 6 genuine differentiation opportunities for "${anchorName}" based on gaps you observe across the competitor set. Return ONLY a valid JSON array, no markdown, no explanation:
[
  { "title": "short opportunity title, max 6 words", "body": "1-2 sentence explanation of the gap and why it matters, max 220 chars" }
]
Return exactly 6 items.`;

    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5-20250929",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    const text = (data.content && data.content[0] && data.content[0].text) || "";
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error("No JSON array found");
    return JSON.parse(jsonMatch[0]);
  }

  async function researchCrossThemes(anchorName, allBrandSummaries) {
    const prompt = `You are a brand strategy consultant. The anchor brand is "${anchorName}". Here is a summary of it and its competitors:

${allBrandSummaries}

Analyze the FULL set (including the anchor brand) for recurring patterns. Return ONLY a valid JSON object, no markdown, no explanation:
{
  "messagingAngles": [
    { "label": "short name for a common messaging angle, max 6 words", "brands": ["Brand A", "Brand B"], "body": "1-2 sentences describing this shared angle and how brands frame it, max 200 chars" }
  ],
  "contentThemes": [
