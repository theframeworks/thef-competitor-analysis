name: competitor-intel-monitor
region: lon1

services:
  - name: web
    github:
      repo: theframeworks/thef-competitor-analysis
      branch: deploy/digitalocean
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /api/health
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
