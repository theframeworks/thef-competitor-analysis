name: competitor-intel
region: lon1

services:
  - name: web
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NODE_VERSION
        scope: BUILD_TIME
        value: "24"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET

# Link an existing managed Postgres cluster in the DO control panel, then set:
#   DATABASE_URL = ${your-db-component-name.DATABASE_URL}
#
# Or add a dev database here (cheapest; fine for internal tooling):
#
# databases:
#   - name: db
#     engine: PG
#     version: "16"
#
# Then reference it from the web service:
#   - key: DATABASE_URL
#     scope: RUN_TIME
#     value: ${db.DATABASE_URL}
